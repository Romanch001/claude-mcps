version: '3.8'
# Auto-generated by migrate_to_digitalocean.py  only active services.
# Deploy on a DigitalOcean Droplet:  docker compose up -d --build

services:

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: "${DOMAIN}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@example.com}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - mcp-net

  apple-health-mcp:
    build: ./apple-health-mcp
    restart: unless-stopped
    environment:
      PORT: "8000"
    networks:
      - mcp-net

  strava-mcp:
    build: ./strava-mcp
    restart: unless-stopped
    environment:
      PORT: "8000"
      STRAVA_CLIENT_ID: "${STRAVA_CLIENT_ID:-}"
      STRAVA_CLIENT_SECRET: "${STRAVA_CLIENT_SECRET:-}"
      STRAVA_REFRESH_TOKEN: "${STRAVA_REFRESH_TOKEN:-}"
    networks:
      - mcp-net

  google-photos-mcp:
    build: ./google-photos-mcp
    restart: unless-stopped
    environment:
      PORT: "8000"
      GOOGLE_PHOTOS_ACCESS_TOKEN: "${GOOGLE_PHOTOS_ACCESS_TOKEN:-}"
    networks:
      - mcp-net

  google-translate-mcp:
    build: ./google-translate-mcp
    restart: unless-stopped
    environment:
      PORT: "8000"
      GOOGLE_TRANSLATE_API_KEY: "${GOOGLE_TRANSLATE_API_KEY:-}"
    networks:
      - mcp-net

  google-sheets-mcp:
    build: ./google-sheets-mcp
    restart: unless-stopped
    environment:
      PORT: "8000"
      GOOGLE_SERVICE_ACCOUNT_JSON: "${GOOGLE_SERVICE_ACCOUNT_JSON:-}"
    networks:
      - mcp-net

  google-maps-mcp:
    build: ./google-maps-mcp
    restart: unless-stopped
    environment:
      PORT: "8000"
      GOOGLE_MAPS_API_KEY: "${GOOGLE_MAPS_API_KEY:-}"
    networks:
      - mcp-net

  discord-mcp:
    build: ./discord-mcp
    restart: unless-stopped
    environment:
      PORT: "8000"
      DISCORD_WEBHOOK_URL: "${DISCORD_WEBHOOK_URL:-}"
    networks:
      - mcp-net

  openscad-mcp:
    build: ./openscad-mcp
    restart: unless-stopped
    environment:
      PORT: "8000"
    networks:
      - mcp-net

  freecad-mcp:
    build: ./freecad-mcp
    restart: unless-stopped
    environment:
      PORT: "8000"
    networks:
      - mcp-net

  blender-mcp:
    build: ./blender-mcp
    restart: unless-stopped
    environment:
      PORT: "8000"
    networks:
      - mcp-net

  youtube-mcp:
    build: ./youtube
    restart: unless-stopped
    environment:
      PORT: "8000"
    networks:
      - mcp-net

  zomato-mcp:
    build: ./zomato
    restart: unless-stopped
    environment:
      PORT: "8000"
      GOOGLE_MAPS_API_KEY: "${GOOGLE_MAPS_API_KEY:-}"
    networks:
      - mcp-net

  wolfram-alpha-mcp:
    build: ./wolfram-alpha
    restart: unless-stopped
    environment:
      PORT: "8000"
      WOLFRAM_APP_ID: "${WOLFRAM_APP_ID:-}"
    networks:
      - mcp-net

networks:
  mcp-net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
