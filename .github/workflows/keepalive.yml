name: Keep Render Services Alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping all MCP health endpoints
        run: |
          URLS=(
            "https://apple-health-mcp.YOUR_DOMAIN/health"
            "https://strava-mcp.YOUR_DOMAIN/health"
            "https://google-photos-mcp.YOUR_DOMAIN/health"
            "https://google-translate-mcp.YOUR_DOMAIN/health"
            "https://google-sheets-mcp.YOUR_DOMAIN/health"
            "https://google-maps-mcp.YOUR_DOMAIN/health"
            "https://discord-mcp.YOUR_DOMAIN/health"
            "https://openscad-mcp.YOUR_DOMAIN/health"
            "https://freecad-mcp.YOUR_DOMAIN/health"
            "https://blender-mcp.YOUR_DOMAIN/health"
            "https://youtube-mcp.YOUR_DOMAIN/health"
            "https://swiggy-mcp.YOUR_DOMAIN/health"
            "https://zomato-mcp.YOUR_DOMAIN/health"
            "https://wolfram-alpha-mcp.YOUR_DOMAIN/health"
          )
          for url in "${URLS[@]}"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$url" || echo "ERR")
            echo "$code  $url"
          done
